name: AI Inference CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r model/training/requirements.txt

    - name: Train Model
      run: |
        python model/training/train.py

    - name: Build Docker Image
      run: |
        docker build -t ai-inference-api:v1 .