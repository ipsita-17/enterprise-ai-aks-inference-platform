apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ai-platform

spec:
  project: default

  source:
    repoURL: https://github.com/ipsita-17/enterprise-ai-aks-inference-platform
    targetRevision: main
    path: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true