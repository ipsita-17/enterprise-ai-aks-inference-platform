apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: ai-api-hpa
  namespace: ai-platform

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-inference-api

  minReplicas: 2
  maxReplicas: 10

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70