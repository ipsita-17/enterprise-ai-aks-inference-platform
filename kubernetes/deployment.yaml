apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-inference-api
  namespace: ai-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-api

  template:
    metadata:
      labels:
        app: ai-api

    spec:
      containers:
      - name: ai-api
        image: ai-inference-api:v1

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: ai-config

        - secretRef:
            name: ai-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 5